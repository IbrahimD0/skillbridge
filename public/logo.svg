<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Brand Gradient matching the UI spec -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>

    <!-- Hard shadow to mimic the 3D bouncy button style -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="0" flood-color="#0F766E" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Squircle Background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)" />

  <g filter="url(#shadow)">
    <!-- Main Level-Up Sparkle -->
    <path d="M 256 64 Q 256 124 316 124 Q 256 124 256 184 Q 256 124 196 124 Q 256 124 256 64 Z" fill="white" />

    <!-- Secondary Sparkle -->
    <path d="M 360 84 Q 360 114 390 114 Q 360 114 360 144 Q 360 114 330 114 Q 360 114 360 84 Z" fill="white" />

    <!-- The Bridge Arc & Outer Pillars -->
    <path d="M 140 424 L 140 324 A 116 116 0 0 1 372 324 L 372 424" fill="none" stroke="white" stroke-width="48" stroke-linecap="round" />

    <!-- The Center Pillar -->
    <line x1="256" y1="208" x2="256" y2="424" stroke="white" stroke-width="48" stroke-linecap="round" />
  </g>
</svg>